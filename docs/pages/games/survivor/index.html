<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Void Survivors — Alex Hugli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../css/style.css?v=4">
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#050510;">
    <div class="game-canvas-wrap survivor-canvas-wrap" style="position:fixed;top:0;left:0;width:100vw;height:100vh;max-height:none;aspect-ratio:auto;border-radius:0;">
                    <canvas id="game"></canvas>

                    <!-- Touch Controls -->
                    <div class="touch-joystick" id="touch-joystick">
                        <div class="touch-joystick-knob" id="touch-joystick-knob"></div>
                    </div>
                    <div class="touch-dodge-btn" id="touch-dodge-btn">DODGE</div>

                    <!-- Title Screen -->
                    <div class="game-overlay" id="title-screen">
                        <div class="title-content">
                            <h2 class="title-glow">VOID SURVIVORS</h2>
                            <p class="title-sub">Survive the swarm. Evolve your arsenal.</p>
                            <div class="title-controls">
                                <span><kbd>WASD</kbd> / <kbd>Arrows</kbd> Move</span>
                                <span><kbd>Space</kbd> Dodge Roll</span>
                                <span><kbd>P</kbd> / <kbd>Esc</kbd> Pause</span>
                            </div>
                            <div class="title-coins" id="title-coins" style="color: #fbbf24; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-bottom: 0.5rem;">Coins: 0</div>
                            <button class="btn btn-primary btn-glow" id="start-btn">Start Game</button>
                            <button class="btn btn-secondary" id="shop-btn" style="margin-top: 0.5rem;">Upgrades</button>
                        </div>
                    </div>

                    <!-- Shop Screen -->
                    <div class="game-overlay hidden" id="shop-screen">
                        <div class="shop-content" style="max-width: 500px; width: 90%;">
                            <h2 style="font-family: 'JetBrains Mono', monospace; color: #fbbf24; margin-bottom: 0.25rem; font-size: 1.3rem;">PERMANENT UPGRADES</h2>
                            <div id="shop-coins" style="color: #fbbf24; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-bottom: 1rem;">Coins: 0</div>
                            <div id="shop-items" style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 55vh; overflow-y: auto; padding-right: 4px;"></div>
                            <button class="btn btn-secondary" id="shop-back-btn" style="margin-top: 1rem;">Back</button>
                        </div>
                    </div>

                    <!-- Level Up Screen -->
                    <div class="game-overlay hidden" id="levelup-screen">
                        <div class="levelup-content">
                            <h2 class="levelup-title">LEVEL UP!</h2>
                            <div class="levelup-cards" id="levelup-cards"></div>
                        </div>
                    </div>

                    <!-- Pause Screen -->
                    <div class="game-overlay hidden" id="pause-screen">
                        <div class="pause-content" style="max-width: 600px; width: 90%;">
                            <h2>PAUSED</h2>
                            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 12px;">
                                <button class="btn btn-primary" id="resume-btn">Resume</button>
                                <button class="btn btn-secondary" id="restart-btn">Restart</button>
                            </div>
                            <button class="btn btn-secondary" id="view-upgrades-btn" style="margin-bottom: 12px; opacity: 0.8; font-size: 0.75rem;">View Upgrades</button>
                            <button class="btn btn-secondary" id="menu-btn" style="opacity: 0.6; font-size: 0.7rem;">Return to Menu</button>
                            <div id="pause-upgrades-panel" class="hidden" style="margin-top: 12px; max-height: 45vh; overflow-y: auto; text-align: left;"></div>
                        </div>
                    </div>

                    <!-- Victory Screen -->
                    <div class="game-overlay hidden" id="victory-screen">
                        <div class="death-content" style="border-color: rgba(251,191,36,0.3);">
                            <h2 class="death-title" style="color: #fbbf24; text-shadow: 0 0 30px rgba(251,191,36,0.6), 0 0 60px rgba(251,191,36,0.3);">VOID CONQUERED</h2>
                            <p style="color: #d4d4d4; font-size: 0.9rem; margin-bottom: 1rem;">You survived the void. Few have.</p>
                            <div class="death-stats" id="victory-stats"></div>
                            <button class="btn btn-primary btn-glow" id="victory-btn" style="background: linear-gradient(135deg, #f59e0b, #d97706);">Play Again</button>
                        </div>
                    </div>

                    <!-- Death Screen -->
                    <div class="game-overlay hidden" id="death-screen">
                        <div class="death-content">
                            <h2 class="death-title">VOID CLAIMED</h2>
                            <div class="death-stats" id="death-stats"></div>
                            <button class="btn btn-primary btn-glow" id="retry-btn">Try Again</button>
                        </div>
                    </div>
                </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
