<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Snake — Alex Hugli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css?v=4">
    <style>
        .snake-canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <section class="page-header">
        <div class="container">
            <a href="../demos.html" class="game-back-link">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Demos
            </a>
            <h1>Snake</h1>
            <p>Use arrow keys or WASD to control the snake. Eat food to grow. Don't hit the walls or yourself.</p>
        </div>
    </section>

    <section>
        <div class="container">
            <div class="game-wrapper">
                <div class="game-stats">
                    <span>Score: <strong id="score">0</strong></span>
                    <span>Best: <strong id="best">0</strong></span>
                    <span>Length: <strong id="length">3</strong></span>
                </div>
                <div class="game-canvas-wrap">
                    <canvas id="game" class="snake-canvas" width="600" height="600"></canvas>
                    <div class="game-over-overlay" id="overlay">
                        <h2 id="overlay-title">Game Over</h2>
                        <p>Score: <strong id="overlay-score">0</strong></p>
                        <button class="btn btn-primary" onclick="startGame()">Play Again</button>
                    </div>
                </div>
                <div class="game-controls" style="margin-top: 20px;">
                    <button class="btn btn-primary" id="startBtn" onclick="startGame()">Start Game</button>
                    <button class="btn btn-secondary" onclick="togglePause()">Pause</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><span class="footer-text">&copy; 2026 Alex Hugli</span><div class="footer-links"><a href="https://github.com/alexfacehead" target="_blank" rel="noopener noreferrer">GitHub</a><a href="https://www.linkedin.com/in/alex-hugli/" target="_blank" rel="noopener noreferrer">LinkedIn</a><a href="../contact.html">Contact</a></div></div></footer>

    <script src="../../js/main.js?v=4"></script>
    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const CELL = canvas.width / GRID;

    let snake, dir, nextDir, food, score, best, gameLoop, paused, running;
    best = parseInt(localStorage.getItem('snake-best') || '0');
    document.getElementById('best').textContent = best;

    const colors = {
        bg: '#111111',
        grid: 'rgba(255,255,255,0.03)',
        head: '#3b82f6',
        body: '#60a5fa',
        food: '#22c55e',
        foodGlow: 'rgba(34, 197, 94, 0.3)'
    };

    function drawGrid() {
        ctx.fillStyle = colors.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = colors.grid;
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
        }
    }

    function spawnFood() {
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        return pos;
    }

    function draw() {
        drawGrid();
        // Food glow
        ctx.shadowColor = colors.foodGlow;
        ctx.shadowBlur = 15;
        ctx.fillStyle = colors.food;
        ctx.beginPath();
        ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Snake
        snake.forEach((seg, i) => {
            const r = i === 0 ? CELL / 2.2 : CELL / 2.5;
            ctx.fillStyle = i === 0 ? colors.head : colors.body;
            ctx.globalAlpha = i === 0 ? 1 : 0.7 + 0.3 * (1 - i / snake.length);
            ctx.beginPath();
            ctx.roundRect(seg.x * CELL + (CELL - r * 2) / 2, seg.y * CELL + (CELL - r * 2) / 2, r * 2, r * 2, 4);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    function update() {
        if (paused) return;
        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
            snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            food = spawnFood();
            // Speed up
            clearInterval(gameLoop);
            const speed = Math.max(60, 150 - snake.length * 3);
            gameLoop = setInterval(tick, speed);
        } else {
            snake.pop();
        }
        draw();
    }

    function tick() { update(); }

    function gameOver() {
        running = false;
        clearInterval(gameLoop);
        if (score > best) {
            best = score;
            localStorage.setItem('snake-best', best);
            document.getElementById('best').textContent = best;
        }
        document.getElementById('overlay-score').textContent = score;
        document.getElementById('overlay').classList.add('visible');
    }

    function startGame() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        paused = false;
        running = true;
        document.getElementById('score').textContent = 0;
        document.getElementById('length').textContent = 3;
        document.getElementById('overlay').classList.remove('visible');
        food = spawnFood();
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, 150);
        draw();
        document.getElementById('startBtn').textContent = 'Restart';
    }

    function togglePause() {
        if (!running) return;
        paused = !paused;
    }

    document.addEventListener('keydown', e => {
        if (!running) return;
        const key = e.key.toLowerCase();
        const map = {
            'arrowup': { x: 0, y: -1 }, 'w': { x: 0, y: -1 },
            'arrowdown': { x: 0, y: 1 }, 's': { x: 0, y: 1 },
            'arrowleft': { x: -1, y: 0 }, 'a': { x: -1, y: 0 },
            'arrowright': { x: 1, y: 0 }, 'd': { x: 1, y: 0 }
        };
        const nd = map[key];
        if (nd && (nd.x + dir.x !== 0 || nd.y + dir.y !== 0)) {
            nextDir = nd;
            e.preventDefault();
        }
        if (key === ' ') { togglePause(); e.preventDefault(); }
    });

    // Initial draw
    drawGrid();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '500 18px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Press Start to play', canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
